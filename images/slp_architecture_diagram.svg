<svg xmlns="http://www.w3.org/2000/svg" width="1100" height="520" viewBox="0 0 1100 520">
  <defs>
    <marker id="arrow" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L12,6 L0,12 Z" fill="#4a5568" />
    </marker>
    <style>
      .title { font: 700 34px Arial, sans-serif; fill: #111827; }
      .label { font: 600 24px Arial, sans-serif; fill: #111827; }
      .small { font: 500 19px Arial, sans-serif; fill: #374151; }
      .conn { stroke: #6b7280; stroke-width: 3; fill: none; marker-end: url(#arrow); }
      .node { fill: #ffffff; stroke: #111827; stroke-width: 3.5; }
      .dot { fill: #6b7280; }
    </style>
  </defs>

  <rect x="0" y="0" width="1100" height="520" fill="#ffffff"/>
  <text x="550" y="56" text-anchor="middle" class="title">Single-Layer Perceptron</text>

  <text x="550" y="122" text-anchor="middle" class="label">ReLU</text>

  <line x1="196" y1="260" x2="456" y2="150" class="conn"/>
  <line x1="196" y1="260" x2="456" y2="260" class="conn"/>
  <line x1="196" y1="260" x2="456" y2="370" class="conn"/>

  <line x1="544" y1="150" x2="804" y2="260" class="conn"/>
  <line x1="544" y1="260" x2="804" y2="260" class="conn"/>
  <line x1="544" y1="370" x2="804" y2="260" class="conn"/>

  <circle cx="160" cy="260" r="36" class="node"/>
  <circle cx="500" cy="150" r="44" class="node"/>
  <circle cx="500" cy="260" r="44" class="node"/>
  <circle cx="500" cy="370" r="44" class="node"/>
  <circle cx="840" cy="260" r="36" class="node"/>

  <circle cx="500" cy="205" r="6" class="dot"/>
  <circle cx="500" cy="225" r="6" class="dot"/>
  <circle cx="500" cy="295" r="6" class="dot"/>
  <circle cx="500" cy="315" r="6" class="dot"/>

  <text x="160" y="332" text-anchor="middle" class="label">Input</text>
  <text x="160" y="360" text-anchor="middle" class="small">1 feature</text>

  <text x="500" y="444" text-anchor="middle" class="label">Hidden Layer</text>
  <text x="500" y="472" text-anchor="middle" class="small">1000 neurons</text>

  <text x="840" y="332" text-anchor="middle" class="label">Output</text>
  <text x="840" y="360" text-anchor="middle" class="small">1 value</text>
</svg>
